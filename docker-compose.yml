version: "3.8"

x-airflow-common: &airflow-common
  build: ./airflow
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "change_me_in_production"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    DB_HOST: postgres
    DB_NAME: sentiment_db
    DB_USER: postgres
    DB_PASSWORD: postgres
    DB_PORT: "5432"
    SENTIMENT_API_URL: http://sentiment-api:8013
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sentiment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "sentiment_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Airflow init (DB migrate + create admin user) ───────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com || true
    restart: "no"

  # ── Airflow webserver ───────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow scheduler ───────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Sentiment inference API ─────────────────────────────────────────────────
  sentiment-api:
    build: ./sentiment
    environment:
      OUTPUT_DIR: /app/output
    volumes:
      - ./output:/app/output:ro
    ports:
      - "8013:8013"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8013/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 200s

  # ── Streamlit UI ────────────────────────────────────────────────────────────
  ui:
    build: ./ui
    environment:
      DB_HOST: postgres
      DB_NAME: sentiment_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      SENTIMENT_API_URL: http://sentiment-api:8013
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
      sentiment-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  airflow_logs:
